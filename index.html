<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rekoci">
<title>Rekoci Timepiece</title>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F5E6C0;
    --dark: #141414;
    --surface: #1E1E1E;
    --surface2: #2A2A2A;
    --surface3: #333333;
    --text: #F0F0F0;
    --text-dim: #888;
    --green: #4CAF7D;
    --green-bg: #0D2E1A;
    --red: #E05555;
    --red-bg: #2E0D0D;
    --orange: #E8943A;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    padding: calc(var(--safe-top) + 12px) 20px 14px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { font-weight: 300; color: var(--text-dim); }

  /* ── Tabs ── */
  .tabs {
    display: flex; background: var(--surface);
    padding: 0 16px 12px; gap: 6px; overflow-x: auto;
    scrollbar-width: none; border-bottom: 1px solid #252525;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    background: var(--surface3); color: var(--text-dim);
    transition: all 0.2s;
  }
  .tab.active { background: var(--gold); color: var(--dark); }

  /* ── Content ── */
  .screen { display: none; padding: 16px 16px calc(var(--safe-bottom) + 80px); }
  .screen.active { display: block; }

  /* ── Dashboard ── */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .kpi {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px; border: 1px solid #2a2a2a;
  }
  .kpi-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .kpi-value { font-size: 20px; font-weight: 700; }
  .kpi-value.gold { color: var(--gold); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.orange { color: var(--orange); }

  .section-title {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 20px 0 10px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 8px;
    border: 1px solid #2a2a2a; cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:active { border-color: var(--gold); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; padding-right: 10px; }
  .card-amount { font-size: 15px; font-weight: 700; }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; }
  .card-meta { font-size: 11px; color: var(--text-dim); }
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge.vk { background: var(--green-bg); color: var(--green); }
  .badge.ak { background: var(--red-bg); color: var(--red); }
  .badge.aus { background: var(--red-bg); color: var(--red); }

  .marge-row {
    display: flex; justify-content: space-between;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a2a;
  }
  .marge-item { text-align: center; }
  .marge-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .marge-val { font-size: 13px; font-weight: 700; margin-top: 2px; }

  /* ── FAB ── */
  .fab {
    position: fixed; right: 20px;
    bottom: calc(var(--safe-bottom) + 76px);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--gold); color: var(--dark);
    font-size: 26px; font-weight: 300; border: none;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4); cursor: pointer;
    z-index: 99; transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid #2a2a2a;
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 0 8px; border: none; background: none;
    font-size: 10px; color: var(--text-dim); cursor: pointer;
    gap: 3px; transition: color 0.15s;
  }
  .nav-btn .icon { font-size: 22px; }
  .nav-btn.active { color: var(--gold); }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
    max-height: 92vh; overflow-y: auto;
    padding: 0 0 calc(var(--safe-bottom) + 20px);
    animation: slideUp 0.28s cubic-bezier(.32,1,.6,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 36px; height: 4px; background: #444; border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid #2a2a2a;
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--gold); }
  .modal-close {
    width: 30px; height: 30px; border-radius: 50%; background: var(--surface3);
    border: none; color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 20px; }

  /* ── Form ── */
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block;
  }
  .form-input {
    width: 100%; background: var(--surface2); border: 1px solid #333;
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 16px; font-family: inherit; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-input option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn {
    padding: 12px; border-radius: 10px; border: 2px solid transparent;
    font-size: 14px; font-weight: 700; cursor: pointer; text-align: center;
    background: var(--surface3); color: var(--text-dim); transition: all 0.15s;
  }
  .type-btn.selected-vk { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .type-btn.selected-ak { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* MwSt Preview */
  .mwst-preview {
    background: var(--surface2); border-radius: 10px;
    padding: 12px 14px; margin-top: -8px; margin-bottom: 16px;
    border: 1px solid #333;
  }
  .mwst-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .mwst-row:last-child { margin-bottom: 0; padding-top: 6px; border-top: 1px solid #333; }
  .mwst-key { font-size: 12px; color: var(--text-dim); }
  .mwst-val { font-size: 12px; font-weight: 700; }

  .submit-btn {
    width: 100%; padding: 15px; border-radius: 12px;
    background: var(--gold); color: var(--dark);
    font-size: 16px; font-weight: 700; border: none; cursor: pointer;
    margin-top: 8px; transition: opacity 0.15s;
  }
  .submit-btn:active { opacity: 0.85; }

  /* Kosten Kategorie farben */
  .cat-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold); display: inline-block; margin-right: 6px;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
  }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Delete btn in detail */
  .danger-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    background: var(--red-bg); color: var(--red);
    font-size: 15px; font-weight: 600; border: 1px solid var(--red);
    cursor: pointer; margin-top: 12px;
  }

  .divider { height: 1px; background: #2a2a2a; margin: 16px 0; }

  .total-bar {
    background: var(--surface2); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid #333;
  }
  .total-bar-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .total-bar-val { font-size: 17px; font-weight: 700; color: var(--gold); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="logo">Rekoci <span>Timepiece</span></div>
    <div style="font-size:11px;color:var(--text-dim)" id="header-date"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="navigate('dashboard')" id="nav-dashboard">
    <span class="icon">◈</span><span>Übersicht</span>
  </button>
  <button class="nav-btn" onclick="navigate('uhren')" id="nav-uhren">
    <span class="icon">⌚</span><span>Uhren</span>
  </button>
  <button class="nav-btn" onclick="navigate('kosten')" id="nav-kosten">
    <span class="icon">📋</span><span>Kosten</span>
  </button>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn" onclick="openAdd()">+</button>

<!-- ══ SCREENS ══ -->

<!-- Dashboard -->
<div class="screen active" id="screen-dashboard">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Umsatz (VK)</div><div class="kpi-value green" id="kpi-umsatz">CHF 0</div></div>
    <div class="kpi"><div class="kpi-label">Ankauf (EK)</div><div class="kpi-value red" id="kpi-ankauf">CHF 0</div></div>
    <div class="kpi"><div class="kpi-label">Marge Total</div><div class="kpi-value gold" id="kpi-marge">CHF 0</div></div>
    <div class="kpi"><div class="kpi-label">MwSt. Schuld</div><div class="kpi-value orange" id="kpi-mwst">CHF 0</div></div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Betriebskosten</div><div class="kpi-value red" id="kpi-kosten">CHF 0</div></div>
    <div class="kpi"><div class="kpi-label">Netto Ergebnis</div><div class="kpi-value gold" id="kpi-netto">CHF 0</div></div>
  </div>
  <div class="section-title">Letzte Einträge</div>
  <div id="dashboard-recent"></div>
</div>

<!-- Uhren -->
<div class="screen" id="screen-uhren">
  <div id="uhren-totals"></div>
  <div class="section-title">Alle Uhren</div>
  <div id="uhren-list"></div>
</div>

<!-- Kosten -->
<div class="screen" id="screen-kosten">
  <div id="kosten-totals"></div>
  <div class="section-title">Alle Kosten</div>
  <div id="kosten-list"></div>
</div>

<!-- ══ MODAL: UHRENEINTRAG ══ -->
<div class="modal-overlay" id="modal-uhr">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-uhr-title">Uhr erfassen</div>
      <button class="modal-close" onclick="closeModal('modal-uhr')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Typ</label>
        <div class="type-toggle">
          <button class="type-btn selected-vk" id="typ-vk" onclick="setTyp('Verkauf')">⬆ Verkauf</button>
          <button class="type-btn" id="typ-ak" onclick="setTyp('Ankauf')">⬇ Ankauf</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Modell / Beschreibung</label>
        <input class="form-input" id="uhr-modell" placeholder="z.B. Rolex Submariner 126610LN" type="text">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Marke</label>
          <select class="form-input" id="uhr-marke">
            <option value="">Wählen</option>
            <option>Rolex</option>
            <option>Patek Philippe</option>
            <option>Audemars Piguet</option>
            <option>Omega</option>
            <option>IWC</option>
            <option>Breitling</option>
            <option>TAG Heuer</option>
            <option>Andere</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Zustand</label>
          <select class="form-input" id="uhr-zustand">
            <option>Neuwertig</option>
            <option>Sehr gut</option>
            <option>Gut</option>
            <option>Akzeptabel</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Einkauf CHF</label>
          <input class="form-input" id="uhr-einkauf" placeholder="0" type="number" inputmode="decimal" onchange="calcMwst()">
        </div>
        <div class="form-group">
          <label class="form-label">Verkauf CHF</label>
          <input class="form-input" id="uhr-verkauf" placeholder="0" type="number" inputmode="decimal" onchange="calcMwst()">
        </div>
      </div>
      <!-- MwSt Preview -->
      <div class="mwst-preview" id="mwst-preview" style="display:none">
        <div class="mwst-row"><span class="mwst-key">Marge</span><span class="mwst-val" id="prev-marge">—</span></div>
        <div class="mwst-row"><span class="mwst-key">MwSt. 8.1% (auf Marge)</span><span class="mwst-val orange" id="prev-mwst" style="color:var(--orange)">—</span></div>
        <div class="mwst-row"><span class="mwst-key">Netto Marge</span><span class="mwst-val" style="color:var(--green)" id="prev-netto">—</span></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Kanal</label>
          <select class="form-input" id="uhr-kanal">
            <option>Showroom</option>
            <option>Chrono24</option>
            <option>eBay</option>
            <option>Instagram</option>
            <option>Privat</option>
            <option>Website</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Zahlung</label>
          <select class="form-input" id="uhr-zahlung">
            <option>Banküberweisung</option>
            <option>Bar</option>
            <option>Kreditkarte</option>
            <option>Chrono24</option>
            <option>eBay</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Datum</label>
        <input class="form-input" id="uhr-datum" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Ref.-Nr. Uhr (optional)</label>
        <input class="form-input" id="uhr-ref" placeholder="z.B. 126610LN" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Bemerkung (optional)</label>
        <input class="form-input" id="uhr-bem" placeholder="" type="text">
      </div>
      <button class="submit-btn" onclick="saveUhr()">Speichern</button>
      <button class="danger-btn" id="delete-uhr-btn" onclick="deleteUhr()" style="display:none">Löschen</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: KOSTEN ══ -->
<div class="modal-overlay" id="modal-kosten">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Kosten erfassen</div>
      <button class="modal-close" onclick="closeModal('modal-kosten')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Beschreibung</label>
        <input class="form-input" id="k-desc" placeholder="z.B. Miete Januar" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Kategorie</label>
        <select class="form-input" id="k-kat">
          <option>Miete Showroom</option>
          <option>Auto – Leasing</option>
          <option>Auto – Tank</option>
          <option>Auto – Service</option>
          <option>Telefon & Internet</option>
          <option>Marketing</option>
          <option>Buchhaltung</option>
          <option>Personalkosten</option>
          <option>Verpackung & Versand</option>
          <option>Plattformgebühren</option>
          <option>Bankgebühren</option>
          <option>Versicherung</option>
          <option>Repräsentation</option>
          <option>Büro & Diverses</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Betrag CHF</label>
          <input class="form-input" id="k-betrag" placeholder="0" type="number" inputmode="decimal" onchange="calcKostenMwst()">
        </div>
        <div class="form-group">
          <label class="form-label">Zahlung</label>
          <select class="form-input" id="k-zahlung">
            <option>Banküberweisung</option>
            <option>Kreditkarte</option>
            <option>Bar</option>
          </select>
        </div>
      </div>
      <div class="mwst-preview" id="k-mwst-preview" style="display:none">
        <div class="mwst-row"><span class="mwst-key">MwSt. 8.1%</span><span class="mwst-val" style="color:var(--orange)" id="k-prev-mwst">—</span></div>
        <div class="mwst-row"><span class="mwst-key">Total (inkl. MwSt.)</span><span class="mwst-val" style="color:var(--red)" id="k-prev-total">—</span></div>
      </div>
      <div class="form-group">
        <label class="form-label">Datum</label>
        <input class="form-input" id="k-datum" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Bemerkung (optional)</label>
        <input class="form-input" id="k-bem" placeholder="" type="text">
      </div>
      <button class="submit-btn" onclick="saveKosten()">Speichern</button>
      <button class="danger-btn" id="delete-kosten-btn" onclick="deleteKosten()" style="display:none">Löschen</button>
    </div>
  </div>
</div>

<script>
// ── Storage ────────────────────────────────────────────────────────────────
const KEY_UHREN  = 'rt_uhren';
const KEY_KOSTEN = 'rt_kosten';

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

let uhren  = load(KEY_UHREN);
let kosten = load(KEY_KOSTEN);
let currentUhrId   = null;
let currentKostenId = null;
let currentTyp = 'Verkauf';
let currentNav = 'dashboard';

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtCHF(n) {
  if (!n && n !== 0) return '—';
  return 'CHF ' + Number(n).toLocaleString('de-CH', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}
function fmtCHF2(n) {
  if (!n && n !== 0) return '—';
  return 'CHF ' + Number(n).toLocaleString('de-CH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return `${p[2]}.${p[1]}.${p[0]}`;
}
const NO_VAT = ['Personalkosten','Lohn'];

// ── Navigation ─────────────────────────────────────────────────────────────
function navigate(page) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  currentNav = page;
  render();
}

// ── Modals ─────────────────────────────────────────────────────────────────
function openAdd() {
  if (currentNav === 'kosten') openKostenModal();
  else openUhrModal();
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function openUhrModal(id) {
  currentUhrId = id || null;
  const uhr = id ? uhren.find(u => u.id === id) : null;
  document.getElementById('modal-uhr-title').textContent = uhr ? 'Uhr bearbeiten' : 'Uhr erfassen';
  document.getElementById('uhr-modell').value  = uhr?.modell  || '';
  document.getElementById('uhr-marke').value   = uhr?.marke   || '';
  document.getElementById('uhr-zustand').value = uhr?.zustand || 'Neuwertig';
  document.getElementById('uhr-einkauf').value = uhr?.einkauf || '';
  document.getElementById('uhr-verkauf').value = uhr?.verkauf || '';
  document.getElementById('uhr-kanal').value   = uhr?.kanal   || 'Showroom';
  document.getElementById('uhr-zahlung').value = uhr?.zahlung || 'Banküberweisung';
  document.getElementById('uhr-datum').value   = uhr?.datum   || today();
  document.getElementById('uhr-ref').value     = uhr?.ref     || '';
  document.getElementById('uhr-bem').value     = uhr?.bem     || '';
  setTyp(uhr?.typ || 'Verkauf');
  document.getElementById('delete-uhr-btn').style.display = uhr ? 'block' : 'none';
  document.getElementById('mwst-preview').style.display = 'none';
  calcMwst();
  document.getElementById('modal-uhr').classList.add('open');
}
function openKostenModal(id) {
  currentKostenId = id || null;
  const k = id ? kosten.find(x => x.id === id) : null;
  document.getElementById('k-desc').value    = k?.desc    || '';
  document.getElementById('k-kat').value     = k?.kat     || 'Miete Showroom';
  document.getElementById('k-betrag').value  = k?.betrag  || '';
  document.getElementById('k-zahlung').value = k?.zahlung || 'Banküberweisung';
  document.getElementById('k-datum').value   = k?.datum   || today();
  document.getElementById('k-bem').value     = k?.bem     || '';
  document.getElementById('delete-kosten-btn').style.display = k ? 'block' : 'none';
  calcKostenMwst();
  document.getElementById('modal-kosten').classList.add('open');
}

function setTyp(typ) {
  currentTyp = typ;
  const vk = document.getElementById('typ-vk');
  const ak = document.getElementById('typ-ak');
  vk.className = 'type-btn' + (typ === 'Verkauf' ? ' selected-vk' : '');
  ak.className = 'type-btn' + (typ === 'Ankauf'  ? ' selected-ak' : '');
  calcMwst();
}

function calcMwst() {
  const ek = parseFloat(document.getElementById('uhr-einkauf').value) || 0;
  const vk = parseFloat(document.getElementById('uhr-verkauf').value) || 0;
  const preview = document.getElementById('mwst-preview');
  if (currentTyp === 'Verkauf' && (ek > 0 || vk > 0)) {
    const marge = vk - ek;
    const mwst  = Math.round(marge * 0.081 * 100) / 100;
    const netto = marge - mwst;
    document.getElementById('prev-marge').textContent = fmtCHF2(marge);
    document.getElementById('prev-mwst').textContent  = fmtCHF2(mwst);
    document.getElementById('prev-netto').textContent = fmtCHF2(netto);
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function calcKostenMwst() {
  const betrag = parseFloat(document.getElementById('k-betrag').value) || 0;
  const kat    = document.getElementById('k-kat').value;
  const preview = document.getElementById('k-mwst-preview');
  if (betrag > 0 && !NO_VAT.includes(kat)) {
    const mwst  = Math.round(betrag * 0.081 * 100) / 100;
    const total = betrag + mwst;
    document.getElementById('k-prev-mwst').textContent  = fmtCHF2(mwst);
    document.getElementById('k-prev-total').textContent = fmtCHF2(total);
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

// ── Save ───────────────────────────────────────────────────────────────────
function saveUhr() {
  const modell = document.getElementById('uhr-modell').value.trim();
  if (!modell) { alert('Bitte Modell eingeben.'); return; }
  const ek = parseFloat(document.getElementById('uhr-einkauf').value) || 0;
  const vk = parseFloat(document.getElementById('uhr-verkauf').value) || 0;
  const marge = currentTyp === 'Verkauf' ? (vk - ek) : 0;
  const mwst  = currentTyp === 'Verkauf' ? Math.round(marge * 0.081 * 100) / 100 : 0;
  const entry = {
    id: currentUhrId || uid(),
    typ: currentTyp,
    modell,
    marke:   document.getElementById('uhr-marke').value,
    zustand: document.getElementById('uhr-zustand').value,
    einkauf: ek,
    verkauf: currentTyp === 'Verkauf' ? vk : 0,
    marge, mwst, netto: marge - mwst,
    kanal:   document.getElementById('uhr-kanal').value,
    zahlung: document.getElementById('uhr-zahlung').value,
    datum:   document.getElementById('uhr-datum').value,
    ref:     document.getElementById('uhr-ref').value.trim(),
    bem:     document.getElementById('uhr-bem').value.trim(),
  };
  if (currentUhrId) {
    uhren = uhren.map(u => u.id === currentUhrId ? entry : u);
  } else {
    uhren.unshift(entry);
  }
  save(KEY_UHREN, uhren);
  closeModal('modal-uhr');
  render();
}

function saveKosten() {
  const desc = document.getElementById('k-desc').value.trim();
  if (!desc) { alert('Bitte Beschreibung eingeben.'); return; }
  const kat    = document.getElementById('k-kat').value;
  const betrag = parseFloat(document.getElementById('k-betrag').value) || 0;
  const hasVat = !NO_VAT.includes(kat);
  const mwst   = hasVat ? Math.round(betrag * 0.081 * 100) / 100 : 0;
  const entry  = {
    id: currentKostenId || uid(),
    desc, kat, betrag, mwst,
    total: betrag + mwst,
    zahlung: document.getElementById('k-zahlung').value,
    datum:   document.getElementById('k-datum').value,
    bem:     document.getElementById('k-bem').value.trim(),
  };
  if (currentKostenId) {
    kosten = kosten.map(k => k.id === currentKostenId ? entry : k);
  } else {
    kosten.unshift(entry);
  }
  save(KEY_KOSTEN, kosten);
  closeModal('modal-kosten');
  render();
}

function deleteUhr() {
  if (!confirm('Eintrag löschen?')) return;
  uhren = uhren.filter(u => u.id !== currentUhrId);
  save(KEY_UHREN, uhren);
  closeModal('modal-uhr');
  render();
}
function deleteKosten() {
  if (!confirm('Eintrag löschen?')) return;
  kosten = kosten.filter(k => k.id !== currentKostenId);
  save(KEY_KOSTEN, kosten);
  closeModal('modal-kosten');
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  renderDashboard();
  renderUhren();
  renderKosten();
}

function renderDashboard() {
  const totalVK    = uhren.filter(u => u.typ==='Verkauf').reduce((s,u) => s+u.verkauf, 0);
  const totalAK    = uhren.filter(u => u.typ==='Ankauf' ).reduce((s,u) => s+u.einkauf, 0);
  const totalMarge = uhren.reduce((s,u) => s+(u.marge||0), 0);
  const totalMwst  = uhren.reduce((s,u) => s+(u.mwst||0), 0);
  const totalKosten= kosten.reduce((s,k) => s+k.total, 0);
  const netto      = totalMarge - totalKosten;

  document.getElementById('kpi-umsatz').textContent = fmtCHF(totalVK);
  document.getElementById('kpi-ankauf').textContent = fmtCHF(totalAK);
  document.getElementById('kpi-marge').textContent  = fmtCHF(totalMarge);
  document.getElementById('kpi-mwst').textContent   = fmtCHF2(totalMwst);
  document.getElementById('kpi-kosten').textContent = fmtCHF(totalKosten);
  const nettoEl = document.getElementById('kpi-netto');
  nettoEl.textContent = fmtCHF(netto);
  nettoEl.className = 'kpi-value ' + (netto >= 0 ? 'green' : 'red');

  // Recent
  const all = [
    ...uhren.map(u => ({...u, _type:'uhr'})),
    ...kosten.map(k => ({...k, _type:'kosten'}))
  ].sort((a,b) => (b.datum||'').localeCompare(a.datum||'')).slice(0, 5);

  const el = document.getElementById('dashboard-recent');
  if (all.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⌚</div><p>Noch keine Einträge.<br>Tippe + um zu starten.</p></div>`;
    return;
  }
  el.innerHTML = all.map(e => {
    if (e._type === 'uhr') {
      const isVK = e.typ === 'Verkauf';
      return `<div class="card" onclick="openUhrModal('${e.id}')">
        <div class="card-top">
          <div class="card-name">${e.modell}</div>
          <div class="card-amount" style="color:${isVK?'var(--green)':'var(--red)'}">${fmtCHF(isVK ? e.verkauf : e.einkauf)}</div>
        </div>
        <div class="card-bottom">
          <div class="card-meta">${fmtDate(e.datum)} · ${e.marke||''}</div>
          <span class="badge ${isVK?'vk':'ak'}">${e.typ}</span>
        </div>
      </div>`;
    } else {
      return `<div class="card" onclick="openKostenModal('${e.id}')">
        <div class="card-top">
          <div class="card-name">${e.desc}</div>
          <div class="card-amount" style="color:var(--red)">${fmtCHF(e.total)}</div>
        </div>
        <div class="card-bottom">
          <div class="card-meta">${fmtDate(e.datum)} · ${e.kat}</div>
          <span class="badge aus">Kosten</span>
        </div>
      </div>`;
    }
  }).join('');
}

function renderUhren() {
  const totalVK    = uhren.filter(u=>u.typ==='Verkauf').reduce((s,u)=>s+u.verkauf,0);
  const totalAK    = uhren.filter(u=>u.typ==='Ankauf' ).reduce((s,u)=>s+u.einkauf,0);
  const totalMarge = uhren.reduce((s,u)=>s+(u.marge||0),0);
  const totalMwst  = uhren.reduce((s,u)=>s+(u.mwst||0),0);

  document.getElementById('uhren-totals').innerHTML = `
    <div class="total-bar"><span class="total-bar-label">Verkauf Total</span><span class="total-bar-val" style="color:var(--green)">${fmtCHF(totalVK)}</span></div>
    <div class="total-bar"><span class="total-bar-label">Ankauf Total</span><span class="total-bar-val" style="color:var(--red)">${fmtCHF(totalAK)}</span></div>
    <div class="total-bar"><span class="total-bar-label">Marge Total</span><span class="total-bar-val">${fmtCHF(totalMarge)}</span></div>
    <div class="total-bar"><span class="total-bar-label">MwSt. geschuldet</span><span class="total-bar-val" style="color:var(--orange)">${fmtCHF2(totalMwst)}</span></div>
  `;

  const el = document.getElementById('uhren-list');
  if (uhren.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⌚</div><p>Noch keine Uhren erfasst.<br>Tippe + um eine Uhr hinzuzufügen.</p></div>`;
    return;
  }
  el.innerHTML = uhren.map(u => {
    const isVK = u.typ === 'Verkauf';
    const margeHtml = isVK ? `
      <div class="marge-row">
        <div class="marge-item"><div class="marge-label">Marge</div><div class="marge-val" style="color:var(--gold)">${fmtCHF(u.marge)}</div></div>
        <div class="marge-item"><div class="marge-label">MwSt. 8.1%</div><div class="marge-val" style="color:var(--orange)">${fmtCHF2(u.mwst)}</div></div>
        <div class="marge-item"><div class="marge-label">Netto</div><div class="marge-val" style="color:var(--green)">${fmtCHF2(u.netto)}</div></div>
      </div>` : '';
    return `<div class="card" onclick="openUhrModal('${u.id}')">
      <div class="card-top">
        <div class="card-name">${u.modell}</div>
        <div class="card-amount" style="color:${isVK?'var(--green)':'var(--red)'}">${fmtCHF(isVK ? u.verkauf : u.einkauf)}</div>
      </div>
      <div class="card-bottom">
        <div class="card-meta">${fmtDate(u.datum)} · ${u.marke||''} · ${u.kanal||''}</div>
        <span class="badge ${isVK?'vk':'ak'}">${u.typ}</span>
      </div>
      ${margeHtml}
    </div>`;
  }).join('');
}

function renderKosten() {
  const totalBetrag = kosten.reduce((s,k)=>s+k.betrag,0);
  const totalMwst   = kosten.reduce((s,k)=>s+k.mwst,0);
  const totalTotal  = kosten.reduce((s,k)=>s+k.total,0);

  document.getElementById('kosten-totals').innerHTML = `
    <div class="total-bar"><span class="total-bar-label">Kosten (netto)</span><span class="total-bar-val" style="color:var(--red)">${fmtCHF(totalBetrag)}</span></div>
    <div class="total-bar"><span class="total-bar-label">MwSt. (Vorsteuer)</span><span class="total-bar-val" style="color:var(--orange)">${fmtCHF2(totalMwst)}</span></div>
    <div class="total-bar"><span class="total-bar-label">Total (inkl. MwSt.)</span><span class="total-bar-val">${fmtCHF(totalTotal)}</span></div>
  `;

  const el = document.getElementById('kosten-list');
  if (kosten.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Noch keine Kosten erfasst.<br>Tippe + um Kosten hinzuzufügen.</p></div>`;
    return;
  }
  el.innerHTML = kosten.map(k => `
    <div class="card" onclick="openKostenModal('${k.id}')">
      <div class="card-top">
        <div class="card-name">${k.desc}</div>
        <div class="card-amount" style="color:var(--red)">${fmtCHF(k.total)}</div>
      </div>
      <div class="card-bottom">
        <div class="card-meta">${fmtDate(k.datum)} · ${k.kat}</div>
        <span class="badge aus">CHF ${k.mwst > 0 ? '+'+k.mwst.toFixed(2)+' MwSt' : 'kein MwSt'}</span>
      </div>
    </div>
  `).join('');
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('de-CH', {day:'2-digit',month:'short',year:'numeric'});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// k-kat change → recalc
document.getElementById('k-kat').addEventListener('change', calcKostenMwst);

render();
</script>
</body>
</html>
